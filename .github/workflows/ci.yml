name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        working-directory: backend
        run: ruff check .

      - name: ruff format --check
        working-directory: backend
        run: ruff format --check .

      - name: pytest
        working-directory: backend
        env:
          JWT_SECRET: ci-only-jwt-secret-32-chars-or-more-aaaa
        run: pytest -v

  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: npm audit (high+critical only, runtime deps)
        # Non-blocking signal: print every advisory at any severity, then
        # fail the job ONLY when something high/critical sneaks into
        # production deps. Dev advisories are noisy and rarely shipped.
        run: |
          npm audit --omit=dev || true
          npm audit --omit=dev --audit-level=high

      - name: TypeScript build
        run: npm run build
