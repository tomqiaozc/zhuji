services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zhuji
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: zhuji
    ports:
      - "5432:5432"
    volumes:
      - zhuji_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhuji"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://zhuji:devpassword@postgres:5432/zhuji
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:4173"]'
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  zhuji_pg_data:
